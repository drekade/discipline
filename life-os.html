<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ЖИЗНЬ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --a:#C4552A;--ad:#8B3A1A;--al:#FAF0EB;--am:#F0997B;
  --bg:#F5F2ED;--s:#FFFFFF;--s2:#EEE9E2;--s3:#E8E2D9;
  --b:#DDD8D0;--b2:#C8C3BB;
  --t:#1C1A17;--t2:#6B6357;--t3:#9B9488;
  --r:14px;--rs:9px;--rp:20px;
  --ff:'Helvetica Neue',Arial,sans-serif;
  --proj1:#C4552A;--proj2:#378ADD;--proj3:#7F77DD;--proj4:#3B9E6B;--proj5:#D4A017;
}
body{font-family:var(--ff);background:var(--bg);color:var(--t);min-height:100vh}
.app{max-width:520px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}

/* HEADER */
.header{padding:16px 16px 0;background:var(--bg);position:sticky;top:0;z-index:50}
.top-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.app-name{font-size:22px;font-weight:700;letter-spacing:-1px;color:var(--t)}
.sync{font-size:11px;color:var(--t3);display:flex;align-items:center;gap:5px}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--a)}
.sdot.ok{background:#3B9E6B}
.nav{display:flex;gap:3px;overflow-x:auto;padding-bottom:12px;scrollbar-width:none;border-bottom:1px solid var(--b)}
.nav::-webkit-scrollbar{display:none}
.nb{flex-shrink:0;padding:6px 14px;border-radius:var(--rp);border:1px solid var(--b);background:transparent;color:var(--t2);font-size:12px;cursor:pointer;transition:all .15s;white-space:nowrap;font-family:var(--ff)}
.nb.active{background:var(--a);color:#fff;border-color:var(--a)}
.nb:hover:not(.active){background:var(--s2)}

/* CONTENT */
.content{flex:1}
.section{display:none;padding:16px 16px 80px}
.section.active{display:block}

/* FAB */
.fab{position:fixed;bottom:24px;right:calc(50% - 260px + 16px);width:52px;height:52px;border-radius:50%;background:var(--a);color:#fff;border:none;font-size:22px;cursor:pointer;box-shadow:0 4px 20px rgba(196,85,42,.3);z-index:40;display:flex;align-items:center;justify-content:center;transition:all .2s}
.fab:hover{background:var(--ad);transform:scale(1.06)}
@media(max-width:520px){.fab{right:16px}}

/* CALENDAR GRID */
.cal-header-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-month-title{font-size:18px;font-weight:700;color:var(--t)}
.cal-nav-btns{display:flex;gap:6px}
.cal-nav-btn{width:32px;height:32px;border-radius:50%;border:1px solid var(--b);background:var(--s);cursor:pointer;color:var(--t2);font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.cal-nav-btn:hover{border-color:var(--a);color:var(--a)}
.cal-week-header{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px}
.cal-week-header span{font-size:10px;color:var(--t3);text-align:center;padding:4px 0;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:20px}
.cday{min-height:52px;border-radius:10px;padding:5px 4px 4px;cursor:pointer;position:relative;transition:all .15s;display:flex;flex-direction:column;align-items:center;background:var(--s);border:1px solid transparent}
.cday:hover{border-color:var(--b);background:var(--s2)}
.cday.today{background:var(--a);border-color:var(--a)}
.cday.today .cday-num{color:#fff;font-weight:700}
.cday.other-month{background:transparent;border-color:transparent}
.cday.other-month .cday-num{color:var(--b2)}
.cday.other-month:hover{background:var(--s2)}
.cday-num{font-size:12px;font-weight:500;color:var(--t2);margin-bottom:3px;line-height:1}
.cday-dots{display:flex;flex-wrap:wrap;gap:2px;justify-content:center;width:100%}
.cdot{width:16px;height:5px;border-radius:3px;flex-shrink:0}

/* SHOOT LIST */
.shoots-section-title{font-size:13px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.shoot-card{background:var(--s);border-radius:var(--r);padding:14px;margin-bottom:10px;border-left:4px solid var(--a);position:relative;overflow:hidden}
.shoot-card::before{content:'';position:absolute;top:0;right:0;width:60px;height:100%;opacity:.05}
.shoot-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.shoot-title{font-size:14px;font-weight:600;color:var(--t)}
.shoot-date{font-size:11px;font-weight:600;color:#fff;padding:3px 9px;border-radius:var(--rp);background:var(--a)}
.shoot-meta{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px}
.shoot-meta-item{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--t2)}
.shoot-status{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:var(--rp);font-size:11px;font-weight:600;cursor:pointer;border:none;font-family:var(--ff);transition:all .15s}
.ss-done{background:#EAF3DE;color:#3B6D11}
.ss-pend{background:var(--al);color:var(--ad)}
.shoot-link{font-size:12px;color:#185FA5;margin-top:6px;display:flex;align-items:center;gap:4px;cursor:pointer;text-decoration:none}

/* CARDS */
.card{background:var(--s);border:1px solid var(--b);border-radius:var(--r);padding:14px;margin-bottom:10px}
.sec-label{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;margin:16px 0 8px}

/* PROJECT CARDS */
.proj-card{background:var(--s);border-radius:var(--r);padding:14px;margin-bottom:10px;border-left:4px solid var(--a)}
.proj-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.proj-name{font-size:15px;font-weight:600;color:var(--t)}
.proj-tag{padding:3px 10px;border-radius:var(--rp);font-size:11px;font-weight:600}
.pt-active{background:var(--al);color:var(--ad)}
.pt-done{background:#EAF3DE;color:#3B6D11}
.proj-desc{font-size:12px;color:var(--t2);margin-bottom:8px}
.proj-link{font-size:12px;color:#185FA5;display:flex;align-items:center;gap:4px;cursor:pointer}

/* IDEAS */
.idea-card{background:var(--s);border-radius:var(--r);overflow:hidden;margin-bottom:10px;border:1px solid var(--b)}
.idea-img{width:100%;height:160px;background:linear-gradient(135deg,var(--al),var(--s2));display:flex;align-items:center;justify-content:center;font-size:44px;overflow:hidden}
.idea-img img{width:100%;height:100%;object-fit:cover}
.idea-body{padding:14px}
.idea-cat{display:inline-block;padding:2px 9px;border-radius:var(--rp);font-size:11px;font-weight:600;background:var(--al);color:var(--ad);margin-bottom:6px}
.idea-title{font-size:14px;font-weight:600;color:var(--t);margin-bottom:4px}
.idea-desc{font-size:12px;color:var(--t2);line-height:1.6}

/* DIARY */
.diary-card{background:var(--s);border-radius:var(--r);padding:16px;margin-bottom:10px;border:1px solid var(--b)}
.diary-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.diary-date{font-size:13px;font-weight:600;color:var(--t)}
.diary-mood{font-size:18px}
.diary-text{font-size:13px;color:var(--t2);line-height:1.7}
.diary-section-label{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:4px;margin-top:8px}

/* STATS */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.stat-c{background:var(--s);border:1px solid var(--b);border-radius:var(--r);padding:14px}
.stat-n{font-size:28px;font-weight:700;color:var(--a);margin-bottom:2px}
.stat-l{font-size:11px;color:var(--t3);font-weight:500}

/* FORMS */
.form-row{margin-bottom:12px}
.field-label{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;font-weight:600;display:block}
input[type=text],input[type=date],input[type=time],select,textarea.f{width:100%;padding:10px 12px;border:1px solid var(--b);border-radius:var(--rs);background:var(--s2);color:var(--t);font-size:13px;font-family:var(--ff);transition:border .15s;-webkit-appearance:none}
input:focus,select:focus,textarea.f:focus{outline:none;border-color:var(--a);background:var(--s)}
textarea.f{resize:none;line-height:1.5}
.btn-primary{width:100%;padding:12px;border:none;border-radius:var(--rs);background:var(--a);color:#fff;font-size:14px;font-family:var(--ff);cursor:pointer;font-weight:600;transition:all .15s}
.btn-primary:hover{background:var(--ad)}
.btn-ghost{padding:7px 14px;border:1px solid var(--b);border-radius:var(--rp);background:transparent;color:var(--t2);font-size:12px;font-family:var(--ff);cursor:pointer;transition:all .15s}
.btn-ghost:hover{border-color:var(--a);color:var(--a)}
.mood-row{display:flex;gap:8px;margin:6px 0 10px}
.mood-pill{padding:8px;border-radius:var(--rs);border:1px solid var(--b);font-size:20px;cursor:pointer;background:var(--s2);flex:1;text-align:center;transition:all .15s}
.mood-pill.sel{background:var(--a);border-color:var(--a)}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.modal-bg.hidden{display:none}
.modal{background:var(--s);border-radius:var(--r) var(--r) 0 0;padding:20px 16px 40px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal-title{font-size:16px;font-weight:700}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--t3);width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:50%}
.modal-close:hover{background:var(--s2)}

/* EMPTY */
.empty{text-align:center;padding:40px 20px;color:var(--t3);font-size:13px}
.empty-icon{font-size:40px;margin-bottom:10px}

/* PROJ COLORS */
.pc-0{border-left-color:var(--proj1)}
.pc-1{border-left-color:var(--proj2)}
.pc-2{border-left-color:var(--proj3)}
.pc-3{border-left-color:var(--proj4)}
.pc-4{border-left-color:var(--proj5)}
.dc-0{background:var(--proj1)}
.dc-1{background:var(--proj2)}
.dc-2{background:var(--proj3)}
.dc-3{background:var(--proj4)}
.dc-4{background:var(--proj5)}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="top-row">
      <div class="app-name">ЖИЗНЬ</div>
      <div class="sync"><span class="sdot" id="sdot"></span><span id="stext">соединение...</span></div>
    </div>
    <nav class="nav">
      <button class="nb active" onclick="showTab('calendar',this)">Календарь</button>
      <button class="nb" onclick="showTab('projects',this)">Проекты</button>
      <button class="nb" onclick="showTab('ideas',this)">Идеи</button>
      <button class="nb" onclick="showTab('diary',this)">Дневник</button>
      <button class="nb" onclick="showTab('week',this)">Итоги</button>
    </nav>
  </div>

  <div class="content">

    <!-- CALENDAR -->
    <div class="section active" id="tab-calendar">
      <div class="cal-header-row">
        <div class="cal-month-title" id="cal-title"></div>
        <div class="cal-nav-btns">
          <button class="cal-nav-btn" onclick="changeMonth(-1)">‹</button>
          <button class="cal-nav-btn" onclick="changeMonth(1)">›</button>
        </div>
      </div>
      <div class="cal-week-header">
        <span>пн</span><span>вт</span><span>ср</span><span>чт</span><span>пт</span><span>сб</span><span>вс</span>
      </div>
      <div class="cal-grid" id="cal-grid"></div>

      <div class="shoots-section-title">Все съёмки</div>
      <div id="shoots-list"></div>
    </div>

    <!-- PROJECTS -->
    <div class="section" id="tab-projects">
      <div id="projects-list"></div>
    </div>

    <!-- IDEAS -->
    <div class="section" id="tab-ideas">
      <div id="ideas-list"></div>
    </div>

    <!-- DIARY -->
    <div class="section" id="tab-diary">
      <div class="card" style="margin-bottom:16px">
        <div style="font-size:14px;font-weight:600;margin-bottom:10px">Сегодня</div>
        <label class="field-label">Настроение</label>
        <div class="mood-row">
          <button class="mood-pill sel" onclick="selMood(this,'хорошо')" title="хорошо">😊</button>
          <button class="mood-pill" onclick="selMood(this,'нейтрально')" title="нейтрально">😐</button>
          <button class="mood-pill" onclick="selMood(this,'плохо')" title="плохо">😔</button>
        </div>
        <div class="form-row">
          <label class="field-label">События дня</label>
          <textarea class="f" id="diary-events" rows="2" placeholder="Что произошло..."></textarea>
        </div>
        <div class="form-row">
          <label class="field-label">Мысли</label>
          <textarea class="f" id="diary-thoughts" rows="2" placeholder="О чём думаю..."></textarea>
        </div>
        <button class="btn-primary" onclick="saveDiary()">Сохранить запись</button>
      </div>
      <div class="shoots-section-title">Предыдущие записи</div>
      <div id="diary-list"></div>
    </div>

    <!-- WEEK -->
    <div class="section" id="tab-week">
      <div class="stat-grid">
        <div class="stat-c"><div class="stat-n" id="st-diary">0</div><div class="stat-l">записей в дневнике</div></div>
        <div class="stat-c"><div class="stat-n" id="st-shoots">0</div><div class="stat-l">съёмок проведено</div></div>
        <div class="stat-c"><div class="stat-n" id="st-ideas">0</div><div class="stat-l">идей добавлено</div></div>
        <div class="stat-c"><div class="stat-n" id="st-proj">0</div><div class="stat-l">активных проектов</div></div>
      </div>
      <div class="shoots-section-title">Проекты</div>
      <div id="week-proj"></div>
    </div>
  </div>

  <button class="fab" onclick="showAddMenu()">+</button>
</div>

<!-- MODALS -->
<div class="modal-bg hidden" id="modal-shoot">
  <div class="modal">
    <div class="modal-head"><span class="modal-title">Новая съёмка</span><button class="modal-close" onclick="hideModal('modal-shoot')">✕</button></div>
    <div class="form-row"><label class="field-label">Дата</label><input type="date" id="sh-date"></div>
    <div class="form-row"><label class="field-label">Время</label><input type="time" id="sh-time"></div>
    <div class="form-row"><label class="field-label">Локация</label><input type="text" id="sh-loc" placeholder="Где?"></div>
    <div class="form-row"><label class="field-label">Проект</label><select id="sh-proj"><option value="">— выбери проект —</option></select></div>
    <div class="form-row"><label class="field-label">Участники</label><input type="text" id="sh-people" placeholder="Имена через запятую"></div>
    <div class="form-row"><label class="field-label">Ссылка на сценарий</label><input type="text" id="sh-script" placeholder="https://..."></div>
    <div class="form-row"><label class="field-label">Заметки</label><textarea class="f" id="sh-notes" rows="2" placeholder="Что взять, особенности..."></textarea></div>
    <button class="btn-primary" onclick="saveShoot()">Сохранить</button>
  </div>
</div>

<div class="modal-bg hidden" id="modal-project">
  <div class="modal">
    <div class="modal-head"><span class="modal-title">Новый проект</span><button class="modal-close" onclick="hideModal('modal-project')">✕</button></div>
    <div class="form-row"><label class="field-label">Название</label><input type="text" id="pr-name" placeholder="Название проекта"></div>
    <div class="form-row"><label class="field-label">Описание</label><textarea class="f" id="pr-desc" rows="2" placeholder="О чём проект?"></textarea></div>
    <div class="form-row"><label class="field-label">Ссылка на документ / сценарий</label><input type="text" id="pr-link" placeholder="https://..."></div>
    <button class="btn-primary" onclick="saveProject()">Сохранить</button>
  </div>
</div>

<div class="modal-bg hidden" id="modal-idea">
  <div class="modal">
    <div class="modal-head"><span class="modal-title">Новая идея</span><button class="modal-close" onclick="hideModal('modal-idea')">✕</button></div>
    <div class="form-row"><label class="field-label">Заголовок</label><input type="text" id="id-title" placeholder="Идея в двух словах"></div>
    <div class="form-row"><label class="field-label">Описание</label><textarea class="f" id="id-desc" rows="3" placeholder="Подробнее..."></textarea></div>
    <div class="form-row"><label class="field-label">Категория</label>
      <select id="id-cat"><option>Блог</option><option>Реклама</option><option>Курсы</option><option>Личное</option><option>Другое</option></select>
    </div>
    <div class="form-row">
      <label class="field-label">Картинка</label>
      <input type="file" accept="image/*" id="idea-file" style="display:none" onchange="handleIdeaImg(this)">
      <button class="btn-ghost" style="width:100%" onclick="document.getElementById('idea-file').click()">📎 Прикрепить фото</button>
      <div id="idea-img-preview" style="margin-top:8px"></div>
    </div>
    <button class="btn-primary" onclick="saveIdea()">Сохранить</button>
  </div>
</div>

<div class="modal-bg hidden" id="modal-add">
  <div class="modal">
    <div class="modal-head"><span class="modal-title">Добавить</span><button class="modal-close" onclick="hideModal('modal-add')">✕</button></div>
    <div style="display:flex;flex-direction:column;gap:10px">
      <button class="btn-primary" style="background:var(--proj1)" onclick="hideModal('modal-add');showModal('modal-shoot')">📅 Съёмка</button>
      <button class="btn-primary" style="background:var(--proj2)" onclick="hideModal('modal-add');showModal('modal-project')">🎬 Проект</button>
      <button class="btn-primary" style="background:var(--proj3)" onclick="hideModal('modal-add');showModal('modal-idea')">💡 Идея</button>
    </div>
  </div>
</div>

<div class="modal-bg hidden" id="modal-proj-detail">
  <div class="modal"><div id="proj-detail-body"></div></div>
</div>

<script>
const SB = 'https://btgtgcwbrrnfbctchata.supabase.co';
const SK = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ0Z3RnY3dicnJuZmJjdGNoYXRhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MTQ2OTgsImV4cCI6MjA5MjI5MDY5OH0.lyEWFcmsL3GIm0FrEZdGkK2uRSx26cNiBGFvCVsjdsY';
const SH = {'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json','Prefer':'return=representation'};

let DB = {shoots:[],projects:[],ideas:[],diary:[]};
let calY = new Date().getFullYear(), calM = new Date().getMonth();
let curMood = 'хорошо';
let ideaImgB64 = null;
const PROJ_COLORS = ['#C4552A','#378ADD','#7F77DD','#3B9E6B','#D4A017'];

async function dbGet(t,lim=100){
  const r = await fetch(`${SB}/rest/v1/${t}?order=created_at.desc&limit=${lim}`,{headers:SH});
  return r.ok ? r.json() : [];
}
async function dbPost(t,d){
  const r = await fetch(`${SB}/rest/v1/${t}`,{method:'POST',headers:SH,body:JSON.stringify(d)});
  return r.ok;
}
async function dbPatch(t,id,d){
  const r = await fetch(`${SB}/rest/v1/${t}?id=eq.${id}`,{method:'PATCH',headers:SH,body:JSON.stringify(d)});
  return r.ok;
}

async function load(){
  try {
    const [s,p,i,d] = await Promise.all([dbGet('shoots'),dbGet('projects'),dbGet('ideas'),dbGet('diary')]);
    DB = {shoots:s||[],projects:p||[],ideas:i||[],diary:d||[]};
    setSyncOk(true);
    renderAll();
    if(DB.projects.length===0) seedProjects();
  } catch(e){ setSyncOk(false); }
}

async function seedProjects(){
  for(const n of [['Реклама','Рекламные съёмки'],['Курсы','Материалы для курсов'],['Личный блог','Контент для блога']]){
    await dbPost('projects',{name:n[0],description:n[1],status:'в работе'});
  }
  load();
}

function setSyncOk(ok){
  document.getElementById('sdot').className='sdot'+(ok?' ok':'');
  document.getElementById('stext').textContent=ok?'синхронизировано':'нет связи';
}

function renderAll(){ renderCal(); renderShoots(); renderProjects(); renderIdeas(); renderDiary(); renderWeek(); updateSelects(); }

// CALENDAR
function renderCal(){
  const months=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  document.getElementById('cal-title').textContent=`${months[calM]} ${calY}`;
  const grid=document.getElementById('cal-grid');
  const firstDow=(new Date(calY,calM,1).getDay()||7)-1;
  const daysInMonth=new Date(calY,calM+1,0).getDate();
  const daysInPrev=new Date(calY,calM,0).getDate();
  const today=new Date();

  // build shoot map: date string -> array of project indices
  const shootMap={};
  DB.shoots.forEach(s=>{
    if(!s.date)return;
    const [sy,sm,sd]=s.date.split('-');
    if(parseInt(sy)===calY && parseInt(sm)-1===calM){
      const key=parseInt(sd);
      if(!shootMap[key])shootMap[key]=[];
      const pi=DB.projects.findIndex(p=>p.name===s.project);
      shootMap[key].push(pi>=0?pi:0);
    }
  });

  let html='';
  // prev month days
  for(let i=0;i<firstDow;i++){
    const d=daysInPrev-firstDow+1+i;
    html+=`<div class="cday other-month"><span class="cday-num">${d}</span></div>`;
  }
  // current month
  for(let d=1;d<=daysInMonth;d++){
    const isToday=d===today.getDate()&&calM===today.getMonth()&&calY===today.getFullYear();
    const dots=(shootMap[d]||[]).slice(0,4).map(ci=>`<span class="cdot dc-${ci}"></span>`).join('');
    html+=`<div class="cday${isToday?' today':''}"><span class="cday-num">${d}</span>${dots?`<div class="cday-dots">${dots}</div>`:''}</div>`;
  }
  // next month
  const total=firstDow+daysInMonth;
  const remaining=total%7===0?0:7-(total%7);
  for(let d=1;d<=remaining;d++) html+=`<div class="cday other-month"><span class="cday-num">${d}</span></div>`;
  grid.innerHTML=html;
}

function changeMonth(d){ calM+=d; if(calM>11){calM=0;calY++;}if(calM<0){calM=11;calY--;} renderCal(); }

// SHOOTS
function renderShoots(){
  const el=document.getElementById('shoots-list');
  if(!DB.shoots.length){el.innerHTML='<div class="empty"><div class="empty-icon">📅</div>Съёмок пока нет<br>Добавь через бота или кнопку +</div>';return;}
  const sorted=[...DB.shoots].sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  el.innerHTML=sorted.map(s=>{
    const pi=DB.projects.findIndex(p=>p.name===s.project);
    const color=PROJ_COLORS[pi>=0?pi:0];
    return `<div class="shoot-card pc-${pi>=0?pi:0}">
      <div class="shoot-top">
        <div class="shoot-title">${s.location||'Съёмка'}</div>
        <div class="shoot-date" style="background:${color}">${formatDate(s.date)}</div>
      </div>
      <div class="shoot-meta">
        ${s.time?`<span class="shoot-meta-item">🕐 ${s.time}</span>`:''}
        ${s.project?`<span class="shoot-meta-item">🎬 ${s.project}</span>`:''}
        ${s.people?`<span class="shoot-meta-item">👥 ${s.people}</span>`:''}
      </div>
      ${s.notes?`<div style="font-size:12px;color:var(--t2);margin-bottom:6px">${s.notes}</div>`:''}
      ${s.script?`<a class="shoot-link" href="${s.script}" target="_blank">📄 Сценарий</a>`:''}
      <div style="margin-top:8px">
        <button class="shoot-status ${s.status==='снято'?'ss-done':'ss-pend'}" onclick="toggleShoot(${s.id},'${s.status}')">
          ${s.status==='снято'?'✅ снято':'🔸 не снято'}
        </button>
      </div>
    </div>`;
  }).join('');
}

function formatDate(d){
  if(!d)return'';
  const [y,m,day]=d.split('-');
  const months=['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
  return `${parseInt(day)} ${months[parseInt(m)-1]}`;
}

async function toggleShoot(id,cur){
  const ns=cur==='снято'?'не снято':'снято';
  await dbPatch('shoots',id,{status:ns});
  load();
}

// PROJECTS
function renderProjects(){
  const el=document.getElementById('projects-list');
  if(!DB.projects.length){el.innerHTML='<div class="empty"><div class="empty-icon">🎬</div>Проектов пока нет</div>';return;}
  el.innerHTML=DB.projects.map((p,i)=>`
    <div class="proj-card pc-${i%5}" onclick="showProjDetail(${p.id})" style="cursor:pointer">
      <div class="proj-header">
        <div class="proj-name">${p.name}</div>
        <span class="proj-tag ${p.status==='готово'?'pt-done':'pt-active'}">${p.status||'в работе'}</span>
      </div>
      ${p.description?`<div class="proj-desc">${p.description}</div>`:''}
      ${p.link?`<a class="proj-link" href="${p.link}" target="_blank" onclick="event.stopPropagation()">📄 Документ</a>`:''}
    </div>`).join('');
}

function showProjDetail(id){
  const p=DB.projects.find(x=>x.id===id);
  if(!p)return;
  const shoots=DB.shoots.filter(s=>s.project===p.name);
  const i=DB.projects.indexOf(p);
  document.getElementById('proj-detail-body').innerHTML=`
    <div class="modal-head"><span class="modal-title">${p.name}</span><button class="modal-close" onclick="hideModal('modal-proj-detail')">✕</button></div>
    <div style="font-size:13px;color:var(--t2);margin-bottom:12px">${p.description||''}</div>
    ${p.link?`<a class="proj-link" href="${p.link}" target="_blank" style="margin-bottom:12px;display:flex">📄 Документ / сценарий</a>`:''}
    <div class="shoots-section-title">Съёмки проекта</div>
    ${shoots.length?shoots.map(s=>`<div class="card" style="margin-bottom:8px;border-left:3px solid ${PROJ_COLORS[i%5]}">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div><div style="font-size:13px;font-weight:600">${s.location||'Съёмка'}</div>
        <div style="font-size:11px;color:var(--t3)">${formatDate(s.date)}${s.time?' · '+s.time:''}</div></div>
        <span class="shoot-status ${s.status==='снято'?'ss-done':'ss-pend'}">${s.status==='снято'?'✅':'🔸'}</span>
      </div></div>`).join(''):'<div style="font-size:13px;color:var(--t3)">Съёмок нет</div>'}
    <div style="margin-top:16px;display:flex;gap:8px">
      <button class="btn-primary" style="${p.status==='готово'?'background:var(--t2)':''}" onclick="toggleProject(${p.id},'${p.status}')">
        ${p.status==='готово'?'↩ Вернуть в работу':'✅ Завершить проект'}
      </button>
    </div>`;
  showModal('modal-proj-detail');
}

async function toggleProject(id,cur){
  await dbPatch('projects',id,{status:cur==='готово'?'в работе':'готово'});
  hideModal('modal-proj-detail');
  load();
}

// DIARY
function renderDiary(){

  if(!DB.diary.length){el.innerHTML='<div class="empty"><div class="empty-icon">📓</div>Записей пока нет</div>';return;}

function selMood(el,m){
  document.querySelectorAll('.mood-pill').forEach(p=>p.classList.remove('sel'));
  el.classList.add('sel');
  curMood=m;
}

async function saveDiary(){
  const events=document.getElementById('diary-events').value;
  const thoughts=document.getElementById('diary-thoughts').value;
  if(!events&&!thoughts){alert('Напиши хоть что-нибудь 🙂');return;}
  const months=['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
  const now=new Date();
  const dateStr=`${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
  await dbPost('diary',{date:dateStr,mood:curMood,events,thoughts});
  document.getElementById('diary-events').value='';
  document.getElementById('diary-thoughts').value='';
  load();
}

// WEEK
function renderWeek(){
  const week=7*24*60*60*1000;
  const now=Date.now();
  document.getElementById('st-diary').textContent=DB.diary.filter(d=>now-new Date(d.created_at)<week).length;
  document.getElementById('st-shoots').textContent=DB.shoots.filter(s=>s.status==='снято'&&now-new Date(s.created_at)<week).length;
  document.getElementById('st-ideas').textContent=DB.ideas.filter(i=>now-new Date(i.created_at)<week).length;
  document.getElementById('st-proj').textContent=DB.projects.filter(p=>p.status!=='готово').length;
  document.getElementById('week-proj').innerHTML=DB.projects.map((p,i)=>`
    <div class="card" style="margin-bottom:8px;border-left:3px solid ${PROJ_COLORS[i%5]}">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:13px;font-weight:600">${p.name}</span>
        <span class="proj-tag ${p.status==='готово'?'pt-done':'pt-active'}">${p.status||'в работе'}</span>
      </div>
    </div>`).join('');
}

function handleIdeaImg(input){
  const file=input.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=e=>{
    ideaImgB64=e.target.result;
    document.getElementById('idea-img-preview').innerHTML=`<img src="${ideaImgB64}" style="max-width:100%;border-radius:8px;max-height:120px;object-fit:cover">`;
  };
  r.readAsDataURL(file);
}

async function saveIdea(){
  const d={title:document.getElementById('id-title').value,description:document.getElementById('id-desc').value,category:document.getElementById('id-cat').value,image_url:ideaImgB64||null};
  if(!d.title){alert('Введи заголовок');return;}
  await dbPost('ideas',d);
  ideaImgB64=null;
  document.getElementById('idea-img-preview').innerHTML='';
  hideModal('modal-idea');
  load();
}
